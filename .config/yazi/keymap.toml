#:schema https://yazi-rs.github.io/schemas/keymap.json

[[mgr.prepend_keymap]]
on = "!"
for = "unix"
run = 'shell --block -- "$SHELL"'
desc = "Open $SHELL here"

[[mgr.prepend_keymap]]
on = "e"
run = 'shell --block -- fresh %h'
desc = "Edit the current file"

[[mgr.prepend_keymap]]
on  = [ "c", "o" ]
run = 'shell --block -- ocr %h | fish -c fish_clipboard_copy'
desc = "Copy file content (OCR)"

[[mgr.prepend_keymap]]
on = "y"
run = ['shell --orphan -- echo %s | fish -c fish_clipboard_copy', "yank"]

[[mgr.prepend_keymap]]
on = "T"
run = "plugin toggle-pane min-preview"
desc = "Show or hide the preview pane"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"
